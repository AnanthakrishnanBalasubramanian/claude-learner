<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Claude Learner</title>

<!-- PWA meta tags -->
<meta name="theme-color" content="#0d1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="LearnClaude"/>
<meta name="description" content="Your daily Claude AI learning companion"/>
<link rel="manifest" href="manifest.json"/>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;550;600;650;700;800&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, query, where, orderBy,
           getDocs, doc, getDoc, setDoc, updateDoc,
           increment, limit, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // Expose to global scope so data.jsx can use them
  window.firebaseApp       = { initializeApp };
  window.firebaseFirestore = { getFirestore, collection, query, where, orderBy,
                               getDocs, doc, getDoc, setDoc, updateDoc,
                               increment, limit, serverTimestamp };

  // Signal that Firebase SDK is ready
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<!-- App files (loaded after Firebase is ready) -->
<script>
  window.addEventListener('firebase-ready', () => {
    const load = (src) => {
      const s = document.createElement('script');
      s.type = 'text/babel';
      s.src  = src;
      document.body.appendChild(s);
    };
    load('android-frame.jsx');
    load('data.jsx');
    load('screens-feed.jsx');
    load('screens-quiz-progress.jsx');
    load('screens-learn.jsx');
    load('app.jsx');
  });
</script>

<!-- PWA service worker registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('SW registered:', reg.scope);
      }).catch(err => console.log('SW error:', err));
    });
  }
</script>
</body>
</html>
